<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- The above 3 meta tags *must* come first in the head; any other head content must come *after* these tags -->
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap.min.css">
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
	<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/js/bootstrap.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
	<script src="js/model.js"></script>
	<script src="js/statCalc.js"></script>
	<script src="js/gui.js"></script>
	<style>
		.unit-selector { width : 150px;	}
		
		.minor-select {	width : 120px; }

        .table-container {
            display: flex;
            gap: 20px;
            padding: 10px;
            overflow-x: auto;
        }

        .table-wrapper {
            flex: 1;
            min-width: 400px;
        }

        .table-wrapper h4 {
            text-align: center;
            margin-bottom: 15px;
        }

        .stat-table {
            width: 100%;
            margin-bottom: 0;
        }

        .stat-table thead th { 
            position: sticky;
            top: 0;
            background: white;
            z-index: 1;
            padding: 8px;
            text-align: center;
            vertical-align: middle;
        }

        .stat-table tbody {
            height: 800px;
            overflow-y: auto;
        }

        .stat-table td, 
        .stat-table th {
            padding: 4px 8px;
            text-align: center;
        }

        .stat-table td:first-child,
        .stat-table th:first-child {
            text-align: left;
        }

        /* Stat-specific colors */
        .stat-HP { background-color: #e8eaf6; }
        .stat-Str { background-color: #ffebee; }
        .stat-Mag { background-color: #e3f2fd; }
        .stat-Skl { background-color: #ffe0b2; } /* 技巧 橙色（浅） */
        .stat-Spd { background-color: #c8e6c9; } /* 速度 浅绿色（浅） */
        .stat-Lck { background-color: #fff9c4; } /* 幸运 黄色（浅） */
        .stat-Def { background-color: #e3f2fd; } /* 防御 浅蓝色（浅） */
        .stat-Res { background-color: #e1bee7; } /* 魔抗 紫色（浅） */

        /* Lighter background for table stripes */
        .table-striped > tbody > tr:nth-of-type(odd) {
            background-color: rgba(0, 0, 0, 0.02);
        }

        /* Make sure header colors are slightly darker */
        .stat-table thead th[class^="stat-"] {
            filter: brightness(0.95);
        }
		
		.cap-td { 
            font-weight: bold;
            background-color: #f5f5f5 !important;
        }

        /* Override bootstrap table styles */
        .table > thead > tr > th,
        .table > tbody > tr > th,
        .table > tbody > tr > td {
            border-bottom: 1px solid #ddd;
        }

        /* Ensure proper scrolling */
        #table-div {
            overflow-x: auto;
            margin-right: 20px;
        }

		.inheritance-panel {
			margin-top: 15px;
			padding: 12px;
			border: 1px solid #ddd;
			border-radius: 6px;
			background: #fafafa;
			max-width: 860px;
		}

		.inheritance-panel h4 {
			margin-top: 0;
		}

		.inheritance-table {
			margin-bottom: 12px;
			background: white;
		}

		.inheritance-table th,
		.inheritance-table td {
			text-align: center;
			vertical-align: middle;
		}

		.inheritance-label {
			text-align: left;
			white-space: nowrap;
			font-weight: 600;
		}

		.inheritance-class-select,
		.inheritance-level-input,
		.inheritance-stat-input {
			width: 100%;
		}

		.inheritance-level-cell {
			min-width: 90px;
		}

		.inheritance-note {
			margin-bottom: 10px;
			color: #666;
		}

		.inheritance-route-section {
			margin-top: 12px;
			padding: 10px 12px;
			border: 1px solid #e3e3e3;
			border-radius: 4px;
			background: white;
		}

		.inheritance-route-section h5 {
			margin-top: 0;
			margin-bottom: 10px;
		}

		.lang-switcher {
			position: fixed;
			top: 10px;
			right: 30px;
			z-index: 9999;
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 6px 10px;
			border: 1px solid #ddd;
			border-radius: 999px;
			background: rgba(255, 255, 255, 0.96);
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
		}

		.lang-switcher-label {
			font-size: 14px;
			font-weight: 600;
			color: #555;
			margin: 0;
			white-space: nowrap;
		}

		.lang-switcher-options {
			display: flex;
			align-items: center;
			gap: 6px;
		}

		.lang-switcher-option {
			border: 1px solid #c9c9c9;
			border-radius: 999px;
			background: #fff;
			color: #444;
			font-size: 14px;
			line-height: 1;
			padding: 6px 12px;
			cursor: pointer;
			transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
		}

		.lang-switcher-option:hover {
			border-color: #999;
		}

		.lang-switcher-option.is-active {
			background: #2f6db3;
			border-color: #2f6db3;
			color: #fff;
		}

		@media (max-width: 768px) {
			.lang-switcher {
				right: 10px;
				gap: 8px;
				padding: 5px 8px;
			}

			.lang-switcher-label {
				font-size: 13px;
			}

			.lang-switcher-option {
				font-size: 13px;
				padding: 5px 10px;
			}
		}
	</style>
    <title data-i18n="ui.pageTitle">Fire Emblem Fates: Character Average Stats</title>
	</head>
	
	<body>
		<div class="lang-switcher">
			<span class="lang-switcher-label" data-i18n="ui.languageSwitch">语言</span>
			<div class="lang-switcher-options" role="group" aria-label="Language switcher">
				<button type="button" class="lang-switcher-option is-active" data-lang-option="zh-CN">简体中文</button>
				<button type="button" class="lang-switcher-option" data-lang-option="en-US">English</button>
			</div>
		</div>
		<div id="container" style="margin: 10px 10px 10px 10px">
			<div style="float : left; margin : 0px 25px 0px 0px">
				<p>
					<h4 data-i18n="ui.unitSelect">Unit Selection</h4>
					<select id="unit-select" class="unit-selector"><option value="none" data-i18n="ui.unitSelect">Select a unit</option></select>
					<select id="base-select" class="minor-select" disabled><option value="none" disabled data-i18n="ui.baseSelect">Select a base</option></select>
					<select id="extra-select" style="width : 140px"><option value=0 data-i18n="ui.extraSelect">Use Eternal Seals</option></select>
					<div id="aptitude-check" style="display: none;"><input type="checkbox" name="aptitude"> <span data-i18n="ui.aptitude">Aptitude</span></div>
					
				</p>

				<div id="child-custom" style="display: none;">
					<p>
						<h4 data-i18n="ui.parentSelect">Parent Selection</h4>
						<select id="parent-select" class="unit-selector"><option value="none" data-i18n="ui.parentSelect">Select parent</option></select>
						<select id="grandparent-select" style="display: none;" class="unit-selector"><option value="none" data-i18n="ui.grandparentSelect">Select grandparent</option></select>
					</p>
				</div>

				<div id="inheritance-custom" class="inheritance-panel" style="display: none;">
					<h4 id="inheritance-title" data-i18n="ui.inheritanceCalculator">Inheritance Calculator</h4>
					<div id="inheritance-inputs"></div>
					<div id="inheritance-output"></div>
				</div>
				
				<div id="avatar-custom" style="display: none;">
					<p>
						<h4 data-i18n="ui.avatarCustomization">Avatar Customization</h4>
						<span id="boon-label" data-i18n="ui.boon">Boon</span>
						<select id="boon-select" class="minor-select">
							<option class="boon" value="HP" selected>HP</option>
							<option class="boon" value="Str" disabled>Strength</option>
							<option class="boon" value="Mag">Magic</option>
							<option class="boon" value="Skl">Skill</option>
							<option class="boon" value="Spd">Speed</option>
							<option class="boon" value="Lck">Luck</option>
							<option class="boon" value="Def">Defense</option>
							<option class="boon" value="Res">Resistance</option>
						</select>
						<span id="bane-label" data-i18n="ui.bane">Bane</span>
						<select id="bane-select" class="minor-select">
							<option class="bane" value="HP" disabled>HP</option>
							<option class="bane" value="Str" selected>Strength</option>
							<option class="bane" value="Mag">Magic</option>
							<option class="bane" value="Skl">Skill</option>
							<option class="bane" value="Spd">Speed</option>
							<option class="bane" value="Lck">Luck</option>
							<option class="bane" value="Def">Defense</option>
							<option class="bane" value="Res">Resistance</option>
						</select>
					</p>
				</div>
				
				<p>
					<h4 data-i18n="ui.classChangeOptions">Class Change Options</h4>
					<select id="level-change-select" class="minor-select" disabled><option value="none" disabled data-i18n="ui.levelSelect">Select a level</option></select>
					<select id="class-change-select" style="width : 210px" disabled><option value="none" disabled data-i18n="ui.classSelect">Select a class</option></select>
					<button id="add-seal" data-i18n="ui.addSeal">Add class change</button>
					<button id="reset" data-i18n="ui.reset">Reset</button>
				</p>
			
				<div id="class-change-list"></div>
			</div>
			<div id="table-div"></div>
		</div>
	
	
	<!--<script>document.write('<script src="js/model.js?dev=' + Math.floor(Math.random() * 100) + '"\><\/script>');</script>
	<script>document.write('<script src="js/statCalc.js?dev=' + Math.floor(Math.random() * 100) + '"\><\/script>');</script>
	<script>document.write('<script src="js/gui.js?dev=' + Math.floor(Math.random() * 100) + '"\><\/script>');</script>-->
	</body>
</html>
