<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- The above 3 meta tags *must* come first in the head; any other head content must come *after* these tags -->
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap.min.css">
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
	<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/js/bootstrap.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
	<script src="js/model.js"></script>
	<script src="js/statCalc.js"></script>
	<script src="js/gui.js"></script>
	<style>
		.unit-selector { width : 150px;	}
		
		.minor-select {	width : 120px; }

        .table-container {
            display: flex;
            gap: 20px;
            padding: 10px;
            overflow-x: auto;
        }

        .table-wrapper {
            flex: 1;
            min-width: 400px;
        }

        .table-wrapper h4 {
            text-align: center;
            margin-bottom: 15px;
        }

        .stat-table {
            width: 100%;
            margin-bottom: 0;
        }

        .stat-table thead th { 
            position: sticky;
            top: 0;
            background: white;
            z-index: 1;
            padding: 8px;
            text-align: center;
            vertical-align: middle;
        }

        .stat-table tbody {
            height: 800px;
            overflow-y: auto;
        }

        .stat-table td, 
        .stat-table th {
            padding: 4px 8px;
            text-align: center;
        }

        .stat-table td:first-child,
        .stat-table th:first-child {
            text-align: left;
        }

        /* Stat-specific colors */
        .stat-HP { background-color: #e8eaf6; }
        .stat-Str { background-color: #ffebee; }
        .stat-Mag { background-color: #e3f2fd; }
        .stat-Skl { background-color: #ffe0b2; } /* 技巧 橙色（浅） */
        .stat-Spd { background-color: #c8e6c9; } /* 速度 浅绿色（浅） */
        .stat-Lck { background-color: #fff9c4; } /* 幸运 黄色（浅） */
        .stat-Def { background-color: #e3f2fd; } /* 防御 浅蓝色（浅） */
        .stat-Res { background-color: #e1bee7; } /* 魔抗 紫色（浅） */

        /* Lighter background for table stripes */
        .table-striped > tbody > tr:nth-of-type(odd) {
            background-color: rgba(0, 0, 0, 0.02);
        }

        /* Make sure header colors are slightly darker */
        .stat-table thead th[class^="stat-"] {
            filter: brightness(0.95);
        }
		
		.cap-td { 
            font-weight: bold;
            background-color: #f5f5f5 !important;
        }

        /* Override bootstrap table styles */
        .table > thead > tr > th,
        .table > tbody > tr > th,
        .table > tbody > tr > td {
            border-bottom: 1px solid #ddd;
        }

        /* Ensure proper scrolling */
        #table-div {
            overflow-x: auto;
            margin-right: 20px;
        }

		.inheritance-panel {
			margin-top: 15px;
			padding: 12px;
			border: 1px solid #ddd;
			border-radius: 6px;
			background: #fafafa;
			max-width: 860px;
		}

		.inheritance-panel h4 {
			margin-top: 0;
		}

		.inheritance-table {
			margin-bottom: 12px;
			background: white;
		}

		.inheritance-table th,
		.inheritance-table td {
			text-align: center;
			vertical-align: middle;
		}

		.inheritance-label {
			text-align: left;
			white-space: nowrap;
			font-weight: 600;
		}

		.inheritance-class-select,
		.inheritance-level-input,
		.inheritance-stat-input {
			width: 100%;
		}

		.inheritance-level-cell {
			min-width: 90px;
		}

		.inheritance-note {
			margin-bottom: 10px;
			color: #666;
		}

		.inheritance-route-section {
			margin-top: 12px;
			padding: 10px 12px;
			border: 1px solid #e3e3e3;
			border-radius: 4px;
			background: white;
		}

		.inheritance-route-section h5 {
			margin-top: 0;
			margin-bottom: 10px;
		}
	</style>
    <title>Fire Emblem Fates: Character Average Stats</title>
	</head>
	
	<body>
		<div style="position:fixed;top:10px;right:30px;z-index:9999;">
      <select id="lang-select" style="font-size:15px;padding:2px 8px;">
        <option value="zh-CN" selected>简体中文</option>
        <option value="en-US">English</option>
      </select>
    </div>
		<div id="container" style="margin: 10px 10px 10px 10px">
			<div style="float : left; margin : 0px 25px 0px 0px">
				<p>
					<h4>Unit Selection</h4>
					<select id="unit-select" class="unit-selector"><option value="none">Select a unit</option></select>
					<select id="base-select" class="minor-select" disabled><option value="none" disabled>Select a base</option></select>
					<select id="extra-select" style="width : 140px"><option value=0>Use Eternal Seals</option></select>
					<div id="aptitude-check" style="display: none;"><input type="checkbox" name="aptitude"> Aptitude</div>
					
				</p>

				<div id="child-custom" style="display: none;">
					<p>
						<h4>Parent Selection</h4>
						<select id="parent-select" class="unit-selector"><option value="none">Select parent</option></select>
						<select id="grandparent-select" style="display: none;" class="unit-selector"><option value="none">Select grandparent</option></select>
					</p>
				</div>

				<div id="inheritance-custom" class="inheritance-panel" style="display: none;">
					<h4 id="inheritance-title">Inheritance Calculator</h4>
					<div id="inheritance-inputs"></div>
					<div id="inheritance-output"></div>
				</div>
				
				<div id="avatar-custom" style="display: none;">
					<p>
						<h4>Avatar Customization</h4>
						<span id="boon-label">Boon</span>
						<select id="boon-select" class="minor-select">
							<option class="boon" value="HP" selected>HP</option>
							<option class="boon" value="Str" disabled>Strength</option>
							<option class="boon" value="Mag">Magic</option>
							<option class="boon" value="Skl">Skill</option>
							<option class="boon" value="Spd">Speed</option>
							<option class="boon" value="Lck">Luck</option>
							<option class="boon" value="Def">Defense</option>
							<option class="boon" value="Res">Resistance</option>
						</select>
						<span id="bane-label">Bane</span>
						<select id="bane-select" class="minor-select">
							<option class="bane" value="HP" disabled>HP</option>
							<option class="bane" value="Str" selected>Strength</option>
							<option class="bane" value="Mag">Magic</option>
							<option class="bane" value="Skl">Skill</option>
							<option class="bane" value="Spd">Speed</option>
							<option class="bane" value="Lck">Luck</option>
							<option class="bane" value="Def">Defense</option>
							<option class="bane" value="Res">Resistance</option>
						</select>
					</p>
				</div>
				
				<p>
					<h4>Class Change Options</h4>
					<select id="level-change-select" class="minor-select" disabled><option value="none" disabled>Select a level</option></select>
					<select id="class-change-select" style="width : 210px" disabled><option value="none" disabled>Select a class</option></select>
					<button id="add-seal">Add class change</button>
					<button id="reset">Reset</button>
				</p>
			
				<div id="class-change-list"></div>
			</div>
			<div id="table-div"></div>
		</div>

	<script>document.write('<script src="js/statCalc.js?dev=' + Math.floor(Math.random() * 100) + '"\><\/script>');</script>
	<script>document.write('<script src="js/gui.js?dev=' + Math.floor(Math.random() * 100) + '"\><\/script>');</script>-->
	</body>
</html>
